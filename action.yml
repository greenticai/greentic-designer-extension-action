name: 'Greentic Designer Extension Publish'
description: 'Build + publish a Greentic Designer Extension (.gtxpack) via the gtdx CLI'
author: 'greenticai'
branding:
  icon: 'package'
  color: 'green'

inputs:
  registry:
    description: |
      Target registry URI. Usually not needed when `store-url` is set.
      Accepts:
        * oci://<host>/<namespace>[/<artifact-name>]  (GHCR, Docker Hub, ACR, Harbor)
        * file://<absolute-path>                       (local filesystem)
        * local                                        (= $GREENTIC_HOME/registries/local)
        * <name>                                       (named entry from ~/.greentic/config.toml)
      When `store-url` + `store-token` are supplied and `registry` is empty,
      the action defaults to `greentic-store` (auto-wired to store-url).
    required: false
    default: ''

  store-url:
    description: |
      Shorthand for Greentic Store HTTP push. When set, the action writes
      ~/.greentic/config.toml with a registry entry named "greentic-store"
      pointing at this URL, and auto-selects it unless `registry` overrides.
      Example: http://62.171.174.152:3030
    required: false
    default: ''

  store-token:
    description: |
      Bearer token for the Store server in `store-url`. Accepts either:
        * a long-lived API token (format `gts_...`) — preferred for CI
        * a short-lived JWT from `/api/v1/auth/login` (expires after 24h)
      When set, the action writes ~/.greentic/credentials.toml mode 0600.
      Pair with `store-url`.
    required: false
    default: ''

  manifest:
    description: 'Path to the project Cargo.toml. Default: ./Cargo.toml'
    required: false
    default: './Cargo.toml'

  version:
    description: 'Override describe.json version — useful for CI tag bumps (e.g. v1.2.3 → 1.2.3).'
    required: false
    default: ''

  force:
    description: 'Overwrite an existing version in the target registry.'
    required: false
    default: 'false'

  dry-run:
    description: 'Validate + build + pack, skip the registry write. Useful for PR checks.'
    required: false
    default: 'false'

  oci-token:
    description: |
      Bearer/PAT for oci:// registries. When unset the action falls back in
      order to: GHCR_TOKEN env, GITHUB_TOKEN env (auto-injected in GHA), OCI_TOKEN
      env, then anonymous. Grant the job `permissions: packages: write` when
      pushing to ghcr.io.
    required: false
    default: ''

  format:
    description: '"human" (default) or "json" output'
    required: false
    default: 'human'

  gtdx-ref:
    description: |
      Git ref of `greentic-designer-extensions` to build gtdx from.
      Defaults to the latest tag. Pin a tag (e.g. "v0.2.0") or commit sha
      for deterministic builds.
    required: false
    default: ''

  rust-toolchain:
    description: 'Rust toolchain version. Must support edition 2024 (>= 1.94).'
    required: false
    default: '1.94'

  cargo-component-version:
    description: 'cargo-component version to install. Default: latest compatible.'
    required: false
    default: ''

outputs:
  sha256:
    description: 'SHA-256 of the published .gtxpack (from the JSON receipt).'
    value: ${{ steps.publish.outputs.sha256 }}
  registry-url:
    description: 'URL of the published artifact (file://, http(s)://, or OCI manifest URL).'
    value: ${{ steps.publish.outputs.registry-url }}
  ext-id:
    description: 'Extension id that was published.'
    value: ${{ steps.publish.outputs.ext-id }}
  version:
    description: 'Published version.'
    value: ${{ steps.publish.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        targets: wasm32-wasip2

    - name: Cache cargo-installed binaries
      id: cache-cargo-bin
      uses: actions/cache@v5
      with:
        path: ~/.cargo/bin
        key: gtdx-cargo-bin-${{ runner.os }}-rust${{ inputs.rust-toolchain }}-ref${{ inputs.gtdx-ref }}-cc${{ inputs.cargo-component-version }}-v1

    - name: Install cargo-component
      if: steps.cache-cargo-bin.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        if [ -n "${{ inputs.cargo-component-version }}" ]; then
          cargo install --locked --version "${{ inputs.cargo-component-version }}" cargo-component
        else
          cargo install --locked cargo-component
        fi

    - name: Install gtdx from greentic-designer-extensions repo
      if: steps.cache-cargo-bin.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        REF_ARG=""
        if [ -n "${{ inputs.gtdx-ref }}" ]; then
          REF_ARG="--rev ${{ inputs.gtdx-ref }}"
          # Try --tag first (semver tags), then fall back to --rev for commit shas.
          if ! cargo install --locked --git https://github.com/greentic-biz/greentic-designer-extensions.git --tag "${{ inputs.gtdx-ref }}" greentic-ext-cli 2>/dev/null; then
            cargo install --locked --git https://github.com/greentic-biz/greentic-designer-extensions.git --rev "${{ inputs.gtdx-ref }}" greentic-ext-cli
          fi
        else
          cargo install --locked --git https://github.com/greentic-biz/greentic-designer-extensions.git greentic-ext-cli
        fi

    - name: Verify toolchain
      shell: bash
      run: |
        set -euo pipefail
        gtdx --version
        cargo component --version

    - name: Wire Greentic Store config (if store-url supplied)
      if: inputs.store-url != ''
      shell: bash
      env:
        STORE_URL: ${{ inputs.store-url }}
        STORE_TOKEN: ${{ inputs.store-token }}
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.greentic"
        cat > "$HOME/.greentic/config.toml" <<EOF
        [default]
        registry = "greentic-store"
        trust-policy = "normal"

        [[registries]]
        name = "greentic-store"
        url = "$STORE_URL"
        EOF
        if [ -n "$STORE_TOKEN" ]; then
          umask 077
          cat > "$HOME/.greentic/credentials.toml" <<EOF
        [tokens]
        greentic-store = "$STORE_TOKEN"
        EOF
          chmod 0600 "$HOME/.greentic/credentials.toml"
        else
          echo "::warning::store-url was provided without store-token. Publish will 401 unless the server accepts anonymous writes."
        fi

    - name: Resolve registry input
      id: resolve-registry
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        STORE_URL: ${{ inputs.store-url }}
      run: |
        set -euo pipefail
        if [ -z "$REGISTRY" ] && [ -n "$STORE_URL" ]; then
          echo "registry=greentic-store" >> "$GITHUB_OUTPUT"
        elif [ -z "$REGISTRY" ]; then
          echo "::error::Either 'registry' or 'store-url' must be set."
          exit 1
        else
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"
        fi

    - name: Publish
      id: publish
      shell: bash
      env:
        # The action defaults gtdx's oci-token lookup chain to:
        # --oci-token (explicit) -> GHCR_TOKEN -> GITHUB_TOKEN -> OCI_TOKEN -> anonymous.
        # In GitHub Actions we wire GITHUB_TOKEN automatically so `permissions:
        # packages: write` + no extra config is enough.
        GITHUB_TOKEN: ${{ inputs.oci-token != '' && inputs.oci-token || github.token }}
      run: |
        set -euo pipefail

        args=(publish
          --registry "${{ steps.resolve-registry.outputs.registry }}"
          --manifest "${{ inputs.manifest }}"
          --format   "${{ inputs.format }}"
        )
        if [ -n "${{ inputs.version }}" ]; then
          args+=(--version "${{ inputs.version }}")
        fi
        if [ "${{ inputs.force }}" = "true" ]; then
          args+=(--force)
        fi
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          args+=(--dry-run)
        fi
        if [ -n "${{ inputs.oci-token }}" ]; then
          args+=(--oci-token "${{ inputs.oci-token }}")
        fi

        # Run gtdx publish and capture its output for parseable receipt access.
        # When --format json is set, stdout is a single JSON object; otherwise
        # we fall back to reading the receipt file that gtdx writes to ./dist/.
        gtdx "${args[@]}" | tee gtdx-publish.stdout

        # Prefer stdout JSON when --format json was used.
        if [ "${{ inputs.format }}" = "json" ]; then
          RECEIPT=$(grep -m1 '^{' gtdx-publish.stdout || true)
        fi
        # Otherwise pick the most recent receipt file written by gtdx.
        if [ -z "${RECEIPT:-}" ]; then
          RECEIPT=$(find "$(dirname "${{ inputs.manifest }}")/dist" -name 'publish-*.json' -print0 2>/dev/null \
                    | xargs -0 -r ls -t | head -1 | xargs -r cat)
        fi

        if [ -n "${RECEIPT:-}" ]; then
          sha=$(echo "$RECEIPT" | jq -r '.sha256 // empty')
          url=$(echo "$RECEIPT" | jq -r '.registry // .registry_url // empty')
          ext_id=$(echo "$RECEIPT" | jq -r '.ext_id // empty')
          ver=$(echo "$RECEIPT" | jq -r '.version // empty')
          {
            echo "sha256=$sha"
            echo "registry-url=$url"
            echo "ext-id=$ext_id"
            echo "version=$ver"
          } >> "$GITHUB_OUTPUT"
        fi
